<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeDigger フェイクディガー</title>
<style>
  :root{
    --bg:#0e1b26; --panel:#15293a; --panel2:#1d3a52; --line:#2c5170;
    --text:#e8f1f7; --muted:#9db4c6; --accent:#3ea0d8; --accent2:#f0a93a;
    --good:#4caf72; --bad:#d64545;
    --c-black:#2b2f36; --c-white:#eef2f5; --c-red:#d64545; --c-blue:#4571d6;
    --c-yellow:#e0b83a; --c-green:#4caf72;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:linear-gradient(160deg,#0b1620,#12283a);color:var(--text)}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--accent);color:#04212f;border:none;padding:9px 16px;border-radius:8px;font-weight:700}
  .btn:hover{filter:brightness(1.08)}
  .btn.sec{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn.mini{padding:5px 12px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* start screen */
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  header.top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  header.top h1{font-size:26px;letter-spacing:1px}
  header.top .sub{color:var(--muted);font-size:13px}
  #start{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px;max-width:560px;margin:24px auto}
  #start h2{margin-bottom:8px}
  #start p{color:var(--muted);line-height:1.7;font-size:14px}
  .rowsel{display:flex;gap:8px;margin:14px 0}
  .rowsel button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-weight:700}
  .rowsel button.on{background:var(--accent);color:#04212f;border-color:var(--accent)}

  /* ===== single-screen game layout (auto-scaled to fit any viewport) ===== */
  #game{position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column;
    justify-content:flex-start;align-items:center;padding:6px;
    background:linear-gradient(160deg,#0b1620,#12283a)}
  #stage{width:100%;max-width:1180px;display:flex;flex-direction:column;gap:7px;transform-origin:top center}
  .topbar{display:flex;align-items:center;gap:10px}
  .topbar h1{font-size:19px;letter-spacing:1px}
  .topbar .sub{color:var(--muted);font-size:11px}
  .banner{background:var(--panel);border:1px solid var(--accent2);border-radius:9px;
    padding:6px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .banner .msg{font-weight:700;font-size:14px}
  .banner .hintmsg{color:var(--muted);font-size:12px}

  .board{display:grid;grid-template-columns:1fr 250px;gap:8px;align-items:stretch}
  .col{display:flex;flex-direction:column;gap:8px;min-height:0}
  .card-box{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px}
  .card-box h3{font-size:12px;color:var(--accent);margin-bottom:6px;letter-spacing:.5px}
  .box-piles{flex:1 1 auto;display:flex;flex-direction:column}
  .box-log{flex:1 1 auto;display:flex;flex-direction:column;min-height:0}

  /* narrow / portrait: single column so it reflows before scaling */
  @media(max-width:820px){
    .board{grid-template-columns:1fr}
    .topbar{display:none}
    .players{flex-direction:row;flex-wrap:wrap}
    .pl{flex:1 1 46%}
    .strat .sdesc{display:none}
  }

  /* ===== piles: every card back (DAI) visible, stacked (HSM) ===== */
  .piles{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;align-content:start}
  @media(max-width:820px){.piles{grid-template-columns:repeat(4,1fr)}}
  .pile{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 4px 6px;transition:.12s}
  .pile.selectable{cursor:pointer;border-color:var(--accent);box-shadow:0 0 0 2px rgba(62,160,216,.3)}
  .pile.selectable:hover{background:#264a68}
  .pile .plabel{font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px;white-space:nowrap}
  .pile .plabel .mono{font-weight:700;color:var(--accent2)}
  .pile.empty{opacity:.5}
  .stack{display:flex;flex-direction:column;gap:2px}
  .slice{display:flex;align-items:center;height:17px;padding:0 4px;border-radius:4px;
    border:1px solid rgba(255,255,255,.14);font-size:9px;font-weight:700}
  .slice.front{height:21px;border-color:var(--accent);box-shadow:0 0 0 1px rgba(62,160,216,.45)}
  .slice.back{background:repeating-linear-gradient(45deg,#284a66,#284a66 4px,#213c54 4px,#213c54 8px);color:#bcd4e6}
  .slice .tag{font-size:8px;color:#9fb8cc;letter-spacing:.5px}
  .slice .dots{display:flex;gap:2px;margin-left:auto}
  .slice .dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.35)}
  .slice .lbl{margin-left:auto;display:flex;align-items:center;gap:3px}
  .slice.sl-black{background:#2b2f36;color:#e3eaf2} .slice.sl-white{background:#eef2f5;color:#2a2a2a}
  .slice.sl-red{background:#d64545;color:#fff} .slice.sl-blue{background:#4571d6;color:#fff}
  .slice.sl-yellow{background:#e0b83a;color:#3a2e00} .slice.sl-green{background:#4caf72;color:#08301c}
  .slice .zap{color:var(--accent2)}

  /* ===== gems in hands (real card artwork) ===== */
  .gem{width:30px;height:41px;border-radius:5px;border:1px solid rgba(255,255,255,.3);
    overflow:hidden;display:flex;flex-direction:column;position:relative;background:#0c1a26}
  .gem .art{flex:1 1 auto;background-size:cover;background-position:center 42%}
  .gem .cap{height:12px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1}
  .gem.back .art{background-position:center;background-size:cover}
  .hand .gem.pick{cursor:pointer;outline:2px solid var(--accent2)}
  .slice .thumb{width:14px;height:14px;border-radius:3px;background-size:cover;background-position:center 42%;
    flex:0 0 auto;margin-right:3px;border:1px solid rgba(0,0,0,.25)}

  /* ===== strategies ===== */
  .strats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  @media(max-width:820px){.strats{grid-template-columns:repeat(3,1fr)}}
  .strat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px;position:relative}
  .strat.avail{cursor:pointer;border-color:var(--good)}
  .strat.avail:hover{background:#264a68}
  .strat.used{opacity:.4}
  .strat .sname{font-weight:700;font-size:13px}
  .strat .scost{position:absolute;top:5px;right:6px;background:var(--accent2);color:#3a2600;border-radius:5px;
    font-size:10px;font-weight:800;padding:0 5px}
  .strat .sdesc{font-size:9.5px;color:var(--muted);line-height:1.3;margin-top:3px}
  .strat .worker{margin-top:3px;font-size:9.5px;color:var(--accent)}

  /* ===== players ===== */
  .players{display:flex;flex-direction:column;gap:6px}
  .pl{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .pl.turn{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(240,169,58,.3)}
  .pl.robtarget{border-color:var(--bad);cursor:pointer;box-shadow:0 0 0 2px rgba(214,69,69,.3)}
  .pl .phead{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px}
  .pl .meta{font-size:10px;color:var(--muted)}
  .pl .hand{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;min-height:16px}
  .worker-dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--accent);margin-left:3px}
  .worker-dot.spent{background:#3a5165}

  .log{flex:1 1 auto;min-height:84px;background:#0c1a26;border:1px solid var(--line);border-radius:8px;padding:7px;
    overflow-y:auto;font-size:11px;line-height:1.55}
  .log .me{color:var(--accent)} .log .ai{color:var(--accent2)} .log .sys{color:var(--muted)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(4,12,20,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}
  .modal h2{margin-bottom:10px}
  .sizebtns{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .sizebtns button{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-weight:700}
  .sizebtns button:hover{background:var(--accent);color:#04212f}
  table.score{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  table.score th,table.score td{border:1px solid var(--line);padding:6px 8px;text-align:center}
  table.score th{background:var(--panel2)}
  .winner{color:var(--accent2);font-weight:800}
  .scoregem{display:inline-block;width:22px;height:28px;border-radius:4px;border:1px solid;background-size:cover;
    background-position:center 42%;margin:1px;vertical-align:middle;position:relative}
  .scoregem b{position:absolute;bottom:0;left:0;right:0;font-size:8px;background:rgba(0,0,0,.6);color:#fff;text-align:center}
  .foot{color:var(--muted);font-size:12px;margin-top:22px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>FakeDigger</h1>
    <span class="sub">フェイクディガー — 宝石発掘バトル（デジタル版・ビギナールール）</span>
  </header>

  <!-- START SCREEN -->
  <div id="start">
    <h2>ゲーム開始</h2>
    <p>戦略カードでワーカーを配置し、価値ある宝石を集めるバトルゲームです。あなたはプレイヤー1。残りはAIが操作します。<br>
    自分の<b>ターゲット色</b>の宝石＝<b>+3点</b>、白＝<b>+1点</b>、黒＝<b>-2点</b>。うら面の<b>DAIヒント</b>（可能性のある色）を手がかりに山札を掘り進めましょう。</p>
    <div style="margin-top:16px"><b>プレイ人数</b>（あなた＋AI）</div>
    <div class="rowsel" id="playerSel">
      <button data-n="2" class="on">2人</button>
      <button data-n="3">3人</button>
      <button data-n="4">4人</button>
    </div>
    <button class="btn" style="width:100%;padding:13px;font-size:16px" onclick="startGame()">スタート</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" style="display:none">
   <div id="stage">
    <div class="topbar">
      <h1>FakeDigger</h1>
      <span class="sub">宝石発掘バトル・デジタル版</span>
    </div>
    <div class="banner">
      <div><div class="msg" id="bannerMsg"></div><div class="hintmsg" id="bannerHint"></div></div>
      <div id="bannerActions"></div>
    </div>
    <div class="board">
      <div class="col">
        <div class="card-box box-piles">
          <h3>山札（8山 / 全札のうら面＝DAIヒントを表示・上が発掘対象）</h3>
          <div class="piles" id="piles"></div>
        </div>
        <div class="card-box box-strats">
          <h3>戦略カード</h3>
          <div class="strats" id="strats"></div>
        </div>
      </div>
      <div class="col">
        <div class="card-box box-players">
          <h3>プレイヤー</h3>
          <div class="players" id="players"></div>
        </div>
        <div class="card-box box-log">
          <h3>ログ</h3>
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>
   </div>
  </div>
</div>

<div id="overlayRoot"></div>

<script>

let G = null; // game state
let uidCounter = 0;

function rnd(n){return Math.floor(Math.random()*n);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function el(id){return document.getElementById(id);}

/* ---------- setup ---------- */
document.querySelectorAll("#playerSel button").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#playerSel button").forEach(x=>x.classList.remove("on"));b.classList.add("on");};
});
function selectedPlayerCount(){return +document.querySelector("#playerSel button.on").dataset.n;}

function startGame(){
  const n = selectedPlayerCount();
  buildGame(n);
  el("start").style.display="none";
  el("game").style.display="block";
  render();
  log("sys","ゲーム開始！ あなたのターゲット色は「"+COLOR_JP[G.players[0].targetColor]+"」です。");
  beginTurn();
}

function buildGame(n){
  uidCounter=0;
  // create card deck
  let deck=[];
  for(const c of COLORS){
    for(let i=0;i<DISTRIBUTION[c];i++){
      const groups = DAI_GROUPS.filter(g=>g.includes(c));
      const hint = groups[rnd(groups.length)];
      deck.push({id:uidCounter++, color:c, hint, doubled:false, knownTo:new Set()});
    }
  }
  shuffle(deck);
  // 8 piles of 5 — store card IDs (card objects live in G.cards)
  const piles=[];
  for(let p=0;p<8;p++) piles.push(deck.slice(p*5,p*5+5).map(c=>c.id));
  // players
  const targets = shuffle([...TARGET_COLORS]);
  const players=[];
  for(let i=0;i<n;i++){
    players.push({
      id:i, name:i===0?"あなた":("AI-"+i), isAI:i!==0,
      hand:[], workers:2, targetColor:targets[i%targets.length], buryCount:0
    });
  }
  const cards={}; deck.forEach(c=>cards[c.id]=c);
  G={
    n, players, piles, cards,
    strategies: STRATEGIES.map(s=>({...s, workerBy:null})),
    startPlayer:0, current:0, round:1,
    appraiseUser:null, gameOver:false,
    phase:"idle", pending:null, log:[]
  };
}

/* ---------- helpers ---------- */
function card(id){return G.cards[id];}
function colorValue(player,color){ // base points of a gem for this player
  if(color==="white")return 1;
  if(color==="black")return -2;
  if(color===player.targetColor)return 3;
  return 0;
}
function pileTop(p){return p.length?p[p.length-1]:null;}
function isKnownTo(c,pid){return c.knownTo.has(pid);}
function markKnown(c,pid){c.knownTo.add(pid);}
function activeStrategyAvailable(s,player){
  if(s.repeatable)return player.workers>=s.cost;
  return s.workerBy===null && player.workers>=s.cost;
}
function log(cls,msg){G.log.push({cls,msg});const l=el("log");if(l){/* rendered in render() */}}

/* ---------- turn flow ---------- */
function beginTurn(){
  if(G.gameOver)return;
  const p=G.players[G.current];
  if(p.workers<=0){advanceTurn();return;}
  if(p.isAI){
    G.phase="idle"; render();
    setTimeout(()=>aiTurn(p), 700);
  }else{
    G.phase="chooseStrategy"; render();
  }
}

function advanceTurn(){
  if(G.gameOver)return;
  // find next player (clockwise) with workers>0
  for(let step=1;step<=G.n;step++){
    const idx=(G.current+step)%G.n;
    if(G.players[idx].workers>0){G.current=idx;beginTurn();return;}
  }
  // nobody has workers -> end round
  endRound();
}

function endRound(){
  if(G.gameOver)return;
  // safety net: a real game ends well before this; guarantees termination vs. AIs
  if(G.round>=60){
    G.gameOver=true;
    log("sys","★ 規定ラウンドに到達したため終了します。");
    render(); setTimeout(showScores,400); return;
  }
  const next = (G.appraiseUser!==null)?G.appraiseUser:(G.startPlayer+1)%G.n;
  log("sys","── ラウンド"+G.round+" 終了 ── 次の開始PL: "+G.players[next].name+
      (G.appraiseUser!==null?"（鑑定使用）":"（時計回り）"));
  G.startPlayer=next; G.current=next; G.round++;
  G.appraiseUser=null;
  G.players.forEach(p=>p.workers=2);
  G.strategies.forEach(s=>s.workerBy=null);
  render();
  setTimeout(beginTurn, 500);
}

function payAndAfter(player,cost){
  player.workers-=cost;
  if(checkGameEnd())return;
  render();
  setTimeout(advanceTurn, player.isAI?600:250);
}

function checkGameEnd(){
  if(G.gameOver)return true;
  const emptyPile = G.piles.some(p=>p.length===0);
  const fullHand = G.players.some(p=>p.hand.length>=6);
  if(emptyPile||fullHand){
    G.gameOver=true;
    log("sys","★ 終了条件成立："+(emptyPile?"山札が0枚":"手札が6枚"));
    render();
    setTimeout(showScores, 400);
    return true;
  }
  return false;
}

/* ============================================================
   ACTION EXECUTION (shared by human & AI)
   ============================================================ */
function execDig(player, pileIdx){
  const pile=G.piles[pileIdx];
  const c=card(pile.pop());
  if(pile.length===0) c.doubled=true;
  markKnown(c,player.id);
  player.hand.push(c.id);
  // only reveal the dug color in the log for the human player (hidden info for AI)
  const shown = player.id===0 ? COLOR_JP[c.color] : "?";
  log(player.isAI?"ai":"me", player.name+"が発掘 → "+shown+(c.doubled?"（最後の1枚・2倍！）":""));
  markStrat(player,"dig");
  payAndAfter(player,1);
}

function execSurvey(player,pileIdx){
  G.piles[pileIdx].forEach(id=>markKnown(card(id),player.id));
  log(player.isAI?"ai":"me", player.name+"が調査 → 山"+(pileIdx+1)+"を確認");
  markStrat(player,"survey");
  payAndAfter(player,1);
}

function execBury(player,pileIdx,handIdx){
  const cid=player.hand.splice(handIdx,1)[0];
  G.piles[pileIdx].push(cid);
  player.buryCount++;
  // buried card: hidden again to others but owner knew it; keep knownTo as is
  log(player.isAI?"ai":"me", player.name+"が埋葬 → 手札を山"+(pileIdx+1)+"へ");
  markStrat(player,"bury");
  payAndAfter(player,1);
}

function execAppraise(player,targetPlayer,handIdxOfTarget){
  const cid=targetPlayer.hand[handIdxOfTarget];
  markKnown(card(cid),player.id);
  G.appraiseUser=player.id;
  log(player.isAI?"ai":"me", player.name+"が鑑定 → "+targetPlayer.name+"の宝石1枚を確認（次R開始PLに）");
  markStrat(player,"appraise");
  payAndAfter(player,1);
}

function execRob(player,targetPlayer,handIdxOfTarget){
  const cid=targetPlayer.hand.splice(handIdxOfTarget,1)[0];
  markKnown(card(cid),player.id);
  player.hand.push(cid);
  log(player.isAI?"ai":"me", player.name+"が強奪 → "+targetPlayer.name+"から宝石を奪取");
  markStrat(player,"rob");
  payAndAfter(player,2);
}

function execLevel(player,pa,pb,sizeA){
  let merged=[...G.piles[pa],...G.piles[pb]];
  shuffle(merged); // face-down remix (survey knowledge on these becomes unreliable -> we keep knownTo but positions shuffle)
  const a=merged.slice(0,sizeA), b=merged.slice(sizeA);
  G.piles[pa]=a; G.piles[pb]=b;
  log(player.isAI?"ai":"me", player.name+"が整地 → 山"+(pa+1)+"/"+(pb+1)+"を "+a.length+"枚・"+b.length+"枚に再構成");
  markStrat(player,"level");
  payAndAfter(player,1);
}

function markStrat(player,key){
  const s=G.strategies.find(x=>x.key===key);
  if(!s.repeatable) s.workerBy=player.id;
}

/* ============================================================
   HUMAN INTERACTION
   ============================================================ */
function humanPickStrategy(key){
  if(G.phase!=="chooseStrategy")return;
  const p=G.players[0];
  const s=G.strategies.find(x=>x.key===key);
  if(!activeStrategyAvailable(s,p))return;

  if(key==="dig"){ startTarget("dig",{},"発掘する山札を選んでください"); }
  else if(key==="survey"){ startTarget("survey",{},"調査する山札を選んでください"); }
  else if(key==="bury"){
    if(p.hand.length===0){flash("手札がありません");return;}
    startTarget("bury_hand",{},"埋葬する手札の宝石を選んでください");
  }
  else if(key==="appraise"){
    if(!othersHaveCards()){flash("他PLに宝石がありません");return;}
    startTarget("appraise_player",{},"鑑定する相手プレイヤーを選んでください");
  }
  else if(key==="rob"){
    if(!othersHaveCards()){flash("他PLに宝石がありません");return;}
    startTarget("rob_player",{},"強奪する相手プレイヤーを選んでください");
  }
  else if(key==="level"){ startTarget("level_a",{},"整地：1つ目の山札を選んでください"); }
}

function startTarget(mode,data,msg){
  G.phase="target"; G.pending={mode,...data,msg}; render();
}
function othersHaveCards(){return G.players.some(p=>p.id!==0 && p.hand.length>0);}

function humanClickPile(idx){
  if(G.phase!=="target")return;
  const pd=G.pending, p=G.players[0], pile=G.piles[idx];
  switch(pd.mode){
    case "dig": execDig(p,idx); break;
    case "survey": execSurvey(p,idx); break;
    case "bury":
      if(pile.length>=5){flash("その山札は5枚で満杯です");return;}
      execBury(p,idx,pd.handIdx); break;
    case "level_a": startTarget("level_b",{pa:idx},"整地：2つ目の山札を選んでください"); break;
    case "level_b":
      if(idx===pd.pa){flash("別の山札を選んでください");return;}
      openLevelSplit(pd.pa,idx); break;
  }
}

function humanClickHand(pid,handIdx){
  if(G.phase!=="target")return;
  const pd=G.pending, p=G.players[0];
  if(pd.mode==="bury" || pd.mode==="bury_hand"){
    if(pid!==0)return;
    startTarget("bury",{handIdx},"埋葬先の山札を選んでください（5枚未満）");
    return;
  }
  if(pd.mode==="appraise_target" && pid===pd.targetPid){
    execAppraise(p,G.players[pd.targetPid],handIdx); return;
  }
  if(pd.mode==="rob_target" && pid===pd.targetPid){
    execRob(p,G.players[pd.targetPid],handIdx); return;
  }
}

function humanClickPlayer(pid){
  if(G.phase!=="target")return;
  const pd=G.pending;
  if(pid===0)return;
  const tp=G.players[pid];
  if(tp.hand.length===0){flash("そのPLは宝石を持っていません");return;}
  if(pd.mode==="appraise_player"){
    // target chooses which card -> AI reveals least useful (a known/black one)
    const idx=aiChooseCardToReveal(tp,0);
    execAppraise(G.players[0],tp,idx);
  }else if(pd.mode==="rob_player"){
    // target chooses which card to give -> AI gives its worst card
    const idx=aiChooseCardToGive(tp);
    execRob(G.players[0],tp,idx);
  }
}

function openLevelSplit(pa,pb){
  const total=G.piles[pa].length+G.piles[pb].length;
  // valid sizeA: 1..total-1, and both parts <=5
  const opts=[];
  for(let a=1;a<total;a++){ if(a<=5 && (total-a)<=5) opts.push(a); }
  let html='<div class="modal"><h2>整地：分け方を選択</h2>'+
    '<p style="color:var(--muted)">合計'+total+'枚を、2つの山（各1〜5枚）に分けます。1つ目の山の枚数を選んでください（中身はシャッフルされます）。</p>'+
    '<div class="sizebtns">';
  opts.forEach(a=>{ html+='<button onclick="confirmLevel('+pa+','+pb+','+a+')">'+a+'枚 / '+(total-a)+'枚</button>'; });
  html+='</div><button class="btn sec" onclick="closeOverlay();cancelTarget()">キャンセル</button></div>';
  el("overlayRoot").innerHTML='<div class="overlay">'+html+'</div>';
}
function confirmLevel(pa,pb,a){ closeOverlay(); execLevel(G.players[0],pa,pb,a); }
function closeOverlay(){ el("overlayRoot").innerHTML=""; }
function cancelTarget(){ if(G.phase==="target"){G.phase="chooseStrategy";G.pending=null;render();} }
function flash(msg){ el("bannerHint").textContent=msg; }

/* ============================================================
   AI
   ============================================================ */
function aiKnownColor(c,pid){ return isKnownTo(c,pid) ? c.color : null; }
function aiExpectedValue(player,c){
  const known=aiKnownColor(c,player.id);
  if(known) return colorValue(player,known);
  // average over hint possibilities
  let s=0; c.hint.forEach(col=>s+=colorValue(player,col));
  return s/c.hint.length;
}
function aiChooseCardToGive(tp){ // victim gives worst-to-self card (black ideal)
  let best=0,bv=Infinity;
  tp.hand.forEach((cid,i)=>{const v=colorValue(tp,card(cid).color); if(v<bv){bv=v;best=i;}});
  return best;
}
function aiChooseCardToReveal(tp,requesterId){ // reveal least valuable / already known
  let best=0,bv=Infinity;
  tp.hand.forEach((cid,i)=>{
    const c=card(cid);
    let v=colorValue(tp,c.color); if(isKnownTo(c,requesterId))v-=100; // prefer already-known
    if(v<bv){bv=v;best=i;}
  });
  return best;
}

function aiTurn(p){
  if(G.gameOver)return;
  // --- evaluate best dig (expected value, doubling on last card) ---
  let bestDig=null;
  G.piles.forEach((pile,i)=>{
    if(pile.length===0)return;
    let ev=aiExpectedValue(p,card(pileTop(pile)));
    if(pile.length===1) ev*=2;
    if(!bestDig||ev>bestDig.ev) bestDig={i,ev};
  });
  // --- best rob: a known, valuable opponent card ---
  let bestRob=null;
  if(p.workers>=2){
    G.players.forEach(op=>{
      if(op.id===p.id||op.hand.length===0)return;
      op.hand.forEach(cid=>{
        const c=card(cid);
        if(isKnownTo(c,p.id)){
          const v=colorValue(p,c.color);
          if(v>0 && (!bestRob||v>bestRob.v)) bestRob={op,color:c.color,v};
        }
      });
    });
  }

  // Priority policy (always makes progress -> game terminates):
  // 1) grab a clearly valuable known card from an opponent
  if(bestRob && bestRob.v>=3){ execRob(p,bestRob.op,aiVictimGivesSpecific(bestRob.op,bestRob.color)); return; }
  // 2) dig a good/neutral pile (fills hand toward 6, advances the game)
  if(bestDig && bestDig.ev>=0){ execDig(p,bestDig.i); return; }
  // 3) all digs look bad -> survey an unknown pile to gain information
  const si=G.piles.findIndex(pl=>pl.length && pl.some(id=>!isKnownTo(card(id),p.id)));
  if(si>=0){ execSurvey(p,si); return; }
  // 4) dump a black card back into a pile (capped, so it can't loop with digging)
  if(p.buryCount<2){
    const bi=p.hand.findIndex(cid=>card(cid).color==="black");
    if(bi>=0){ const t=G.piles.findIndex(pl=>pl.length<5); if(t>=0){ execBury(p,t,bi); return; } }
  }
  // 5) nothing attractive -> dig the least-bad pile anyway to keep the game moving
  if(bestDig){ execDig(p,bestDig.i); return; }
  // 6) no cards anywhere to act on -> just spend remaining workers
  payAndAfter(p,p.workers);
}
function aiVictimGivesSpecific(op,color){
  const i=op.hand.findIndex(cid=>card(cid).color===color);
  return i>=0?i:aiChooseCardToGive(op);
}

/* ============================================================
   SCORING
   ============================================================ */
function scoreHand(player){
  const counts={}; COLORS.forEach(c=>counts[c]=0);
  let base=0; const detail=[];
  player.hand.forEach(cid=>{
    const c=card(cid); counts[c.color]++;
    let v=colorValue(player,c.color); if(c.doubled)v*=2;
    base+=v;
  });
  let bonus=0; const bonusNotes=[];
  // all 5 non-black colors present
  const has5 = ["white","red","blue","yellow","green"].every(c=>counts[c]>0);
  if(has5){bonus+=10;bonusNotes.push("5色ボーナス +10");}
  // 5 of same
  const same5 = COLORS.some(c=>counts[c]>=5);
  if(same5){bonus+=20;bonusNotes.push("同色5枚 +20");}
  return {base,bonus,total:base+bonus,counts,bonusNotes};
}

function showScores(){
  const rows=G.players.map(p=>({p, s:scoreHand(p)}));
  const max=Math.max(...rows.map(r=>r.s.total));
  let html='<div class="modal"><h2>ゲーム終了 — 得点計算</h2>'+
    '<table class="score"><tr><th>PL</th><th>ターゲット</th><th>手札</th><th>基本点</th><th>ボーナス</th><th>合計</th></tr>';
  rows.forEach(r=>{
    const win=r.s.total===max;
    const handStr=r.p.hand.length ? r.p.hand.map(cid=>{const c=card(cid);
      return '<span class="scoregem" style="background-image:url('+GEM_IMG[c.color]+');border-color:'+COLOR_HEX[c.color]+'" title="'+COLOR_JP[c.color]+'">'+(c.doubled?'<b>×2</b>':'')+'</span>';
    }).join("") : "（なし）";
    html+='<tr'+(win?' class="winner"':'')+'><td>'+r.p.name+(win?' 👑':'')+'</td>'+
      '<td>'+COLOR_JP[r.p.targetColor]+'</td>'+
      '<td style="font-size:11px;text-align:left">'+handStr+'</td>'+
      '<td>'+r.s.base+'</td>'+
      '<td>'+(r.s.bonusNotes.join("<br>")||'-')+'</td>'+
      '<td><b>'+r.s.total+'</b></td></tr>';
  });
  html+='</table>';
  const winners=rows.filter(r=>r.s.total===max).map(r=>r.p.name);
  html+='<p style="margin-top:12px;font-size:16px" class="winner">勝者：'+winners.join(" / ")+'</p>';
  html+='<button class="btn" style="margin-top:6px" onclick="location.reload()">もう一度プレイ</button></div>';
  el("overlayRoot").innerHTML='<div class="overlay">'+html+'</div>';
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  if(!G)return;
  const meTurn = G.current===0 && !G.gameOver && G.players[0].workers>0;
  // banner
  const cur=G.players[G.current];
  el("bannerMsg").textContent = G.gameOver?"ゲーム終了":
    ("ラウンド"+G.round+" / "+cur.name+"の手番");
  if(G.phase==="target"){ el("bannerHint").textContent=G.pending.msg; }
  else if(meTurn){ el("bannerHint").textContent="戦略カードを選んでください（残ワーカー "+G.players[0].workers+"）"; }
  else if(!G.gameOver){ el("bannerHint").textContent="AI思考中…"; }
  // banner actions
  const ba=el("bannerActions"); ba.innerHTML="";
  if(G.phase==="target"){
    const b=document.createElement("button"); b.className="btn sec"; b.textContent="キャンセル";
    b.onclick=cancelTarget; ba.appendChild(b);
  }

  renderPiles(); renderStrats(); renderPlayers(); renderLog();
  fitStage();
}

// Scale the whole board down so it always fits the viewport (no page scroll, any device).
function fitStage(){
  const game=el("game"); if(!game || game.style.display==="none") return;
  const stage=el("stage"); if(!stage) return;
  stage.style.transform="none";
  const natural=stage.scrollHeight;      // content height, independent of position
  if(natural<=0) return;
  const avail=window.innerHeight-12;      // 6px top + 6px bottom breathing room
  if(natural<=avail){
    // already fits — align to the top (small offset), leaving any slack at the bottom
    const ty=Math.min(Math.round((avail-natural)/2), 16);
    stage.style.transform = ty>0 ? "translateY("+ty+"px)" : "none";
  }else{
    // too tall — scale down from the top so it fits exactly
    stage.style.transform = "scale("+(avail/natural).toFixed(4)+")";
  }
}
window.addEventListener("resize", fitStage);

function sliceHTML(c,isFront){
  // one card in a pile, viewed from the back — DAI hint (possible colors) always visible.
  // Surveyed/known cards show their real color instead.
  const zap = isFront && c._pileLen===1 ? '<span class="zap">⚡</span>' : '';
  if(isKnownTo(c,0)){
    return '<div class="slice sl-'+c.color+(isFront?' front':'')+'">'+
      '<span class="thumb" style="background-image:url('+GEM_IMG[c.color]+')"></span>'+
      '<span class="lbl">'+COLOR_JP[c.color]+zap+'</span></div>';
  }
  const dots=c.hint.map(col=>'<span class="dot" style="background:var(--c-'+col+')"></span>').join("");
  return '<div class="slice back'+(isFront?' front':'')+'">'+
    '<span class="tag">'+(isFront?'掘':'')+'</span>'+zap+'<span class="dots">'+dots+'</span></div>';
}

function renderPiles(){
  const wrap=el("piles"); wrap.innerHTML="";
  const targetingPile = G.phase==="target" &&
    ["dig","survey","bury","level_a","level_b"].includes(G.pending.mode);
  G.piles.forEach((pile,i)=>{
    const d=document.createElement("div"); d.className="pile"+(pile.length===0?" empty":"");
    if(targetingPile){
      const ok = (G.pending.mode==="bury") ? pile.length<5 : pile.length>0;
      if(ok){ d.classList.add("selectable"); d.onclick=()=>humanClickPile(i); }
    }
    let inner='<div class="plabel">山'+(i+1)+' <span class="mono">'+pile.length+'</span>枚'+
      (pile.length===1?' ⚡':'')+'</div><div class="stack">';
    if(pile.length===0){
      inner+='<div class="slice back" style="opacity:.4;justify-content:center">空</div>';
    }else{
      // top of pile (dig target) shown first (at the top of the stack)
      for(let k=pile.length-1;k>=0;k--){
        const c=card(pile[k]); c._pileLen=pile.length;
        inner+=sliceHTML(c, k===pile.length-1);
      }
    }
    inner+='</div>';
    d.innerHTML=inner; wrap.appendChild(d);
  });
}

function renderStrats(){
  const wrap=el("strats"); wrap.innerHTML="";
  const me=G.players[0];
  const canPick = G.current===0 && G.phase==="chooseStrategy" && !G.gameOver;
  G.strategies.forEach(s=>{
    const d=document.createElement("div"); d.className="strat";
    const avail=activeStrategyAvailable(s,me);
    if(canPick && avail){ d.classList.add("avail"); d.onclick=()=>humanPickStrategy(s.key); }
    if(!s.repeatable && s.workerBy!==null) d.classList.add("used");
    let workerTxt="";
    if(s.workerBy!==null && !s.repeatable) workerTxt='<div class="worker">🔒 '+G.players[s.workerBy].name+'が使用中</div>';
    d.innerHTML='<div class="sname">'+s.name+'</div><div class="scost">C'+s.cost+'</div>'+
      '<div class="sdesc">'+s.desc+'</div>'+workerTxt;
    wrap.appendChild(d);
  });
}

function renderPlayers(){
  const wrap=el("players"); wrap.innerHTML="";
  const targetingPlayer = G.phase==="target" &&
    ["appraise_player","rob_player"].includes(G.pending.mode);
  G.players.forEach(p=>{
    const d=document.createElement("div"); d.className="pl";
    if(p.id===G.current && !G.gameOver) d.classList.add("turn");
    if(targetingPlayer && p.id!==0 && p.hand.length>0){
      d.classList.add("robtarget"); d.onclick=()=>humanClickPlayer(p.id);
    }
    let workers=""; for(let i=0;i<2;i++) workers+='<span class="worker-dot'+(i<p.workers?'':' spent')+'"></span>';
    let head='<div class="phead"><span>'+p.name+(p.id===0?' 🧑':' 🤖')+'</span><span>'+workers+'</span></div>';
    let meta='<div class="meta">'+(p.id===0?('ターゲット:'+COLOR_JP[p.targetColor]+' / '):'')+'手札 '+p.hand.length+'枚</div>';
    let hand='<div class="hand">';
    p.hand.forEach((cid,hi)=>{
      const c=card(cid);
      // show face if: your own hand, OR you've appraised/known it
      const reveal = (p.id===0) || isKnownTo(c,0);
      if(reveal){
        hand+='<span class="gem" style="border-color:'+COLOR_HEX[c.color]+'">'+
          '<span class="art" style="background-image:url('+GEM_IMG[c.color]+')"></span>'+
          '<span class="cap" style="background:'+COLOR_HEX[c.color]+';color:'+capText(c.color)+'">'+
          COLOR_JP[c.color]+(c.doubled?'²':'')+'</span></span>';
      }else{
        hand+='<span class="gem back"><span class="art" style="background-image:url('+BACK_IMG+')"></span></span>';
      }
    });
    hand+='</div>';
    d.innerHTML=head+meta+hand;
    // hand card picking (bury / appraise_target / rob_target)
    if(G.phase==="target"){
      const pd=G.pending;
      if((pd.mode==="bury"||pd.mode==="bury_hand")&&p.id===0){
        // enable hand card pick for burying
        const gems=d.querySelectorAll(".hand .gem");
        gems.forEach((g,hi)=>{g.classList.add("pick");g.onclick=(e)=>{e.stopPropagation();startTarget("bury",{handIdx:hi},"埋葬先の山札を選んでください（5枚未満）");};});
      }
    }
    wrap.appendChild(d);
  });
}

function renderLog(){
  const l=el("log");
  l.innerHTML=G.log.slice(-40).map(e=>'<div class="'+e.cls+'">'+e.msg+'</div>').join("");
  l.scrollTop=l.scrollHeight;
}
</script>
</body>
</html>
